<main class="container py-4">
      <h1 class="mb-4">All Products</h1>
      
      <!-- Filters -->
      <div class="row mb-4">
        <div class="col-md-6">
          <select class="form-select" [(ngModel)]="categoryFilter" (change)="filterProducts()">
            <option value="all">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
        <div class="col-md-6">
          <select class="form-select" [(ngModel)]="sortBy" (change)="sortProducts()">
            <option value="name">Sort by Name</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
          </select>
        </div>
      </div>
      
      <!-- Products Grid -->
      <div class="row" id="productsContainer">
        <div class="col-lg-4 col-md-6 mb-4" *ngFor="let product of filteredProducts">
          <div class="card product-card h-100">
            <img [src]="product.imageUrl?.replace('https://localhost:7128https://localhost:7128','https://localhost:7128') || 'https://via.placeholder.com/300x200'" 
                 class="card-img-top" 
                 [alt]="product.name"
                 onerror="this.src='https://via.placeholder.com/300x200/6c757d/ffffff?text=Image+Not+Found'">
            <div class="card-body">
              <span class="category-badge">{{product.category || 'Electronics'}}</span>
              
              <!-- ✅ Out of Stock Badge -->
              <div *ngIf="product.stock === 0" class="badge bg-danger mb-2">Out of Stock</div>
              
              <h5 class="card-title">{{product.name}}</h5>
              <p class="card-text">{{product.description | slice:0:100}}...</p>
              <p class="product-price">{{formatPrice(product.price)}}</p>
              <div class="d-flex justify-content-between">
                <a [routerLink]="['/product', product.id]" class="btn btn-outline-primary">View Details</a>
                <button class="btn btn-primary" (click)="addToCart(product)" [disabled]="product.stock === 0">Add to Cart</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
