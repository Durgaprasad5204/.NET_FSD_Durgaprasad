<div class="container mt-4">
      <h2>Admin - Product Management</h2>
      <a routerLink="/admin/add" class="btn btn-success mb-3">Add New Product</a>
      <table class="table table-bordered">
        <thead>
          <tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let product of products">
            <td>{{product.id}}</td>
            <td>{{product.name}}</td>
            <td>{{product.price | currency:'INR'}}</td>
            <td>{{product.stock}}</td>
            <td>
              <a [routerLink]="['/admin/add', product.id]" class="btn btn-primary btn-sm me-2">Edit</a>
              <button class="btn btn-danger btn-sm" (click)="deleteProduct(product.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
