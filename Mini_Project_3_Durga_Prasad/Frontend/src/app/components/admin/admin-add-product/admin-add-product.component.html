<div class="container mt-4">
      <h2>{{isEdit ? 'Edit' : 'Add'}} Product</h2>
      <form [formGroup]="productForm" (ngSubmit)="saveProduct()">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" formControlName="name" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea formControlName="description" class="form-control"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Price</label>
          <input type="number" formControlName="price" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Stock</label>
          <input type="number" formControlName="stock" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Image URL</label>
          <input type="text" formControlName="imageUrl" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <select formControlName="category" class="form-control">
            <option value="electronics">Electronics</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="productForm.invalid">Save</button>
        <a routerLink="/admin" class="btn btn-secondary ms-2">Cancel</a>
      </form>
    </div>
