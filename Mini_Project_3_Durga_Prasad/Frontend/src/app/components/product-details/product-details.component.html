<main class="container py-4">
      <div class="row" *ngIf="product">
        <div class="col-md-6">
          <img [src]="product.imageUrl?.replace('https://localhost:7128https://localhost:7128','https://localhost:7128') || 'https://via.placeholder.com/400x400'"
               class="product-details-image img-fluid rounded" 
               [alt]="product.name"
               onerror="this.src='https://via.placeholder.com/400x400/6c757d/ffffff?text=Image+Not+Found'">
        </div>
        <div class="col-md-6">
          <h1>{{product.name}}</h1>
          <span class="category-badge">{{product.category || 'Electronics'}}</span>
          <p class="product-details-price mt-3">{{formatPrice(product.price)}}</p>
          <p class="lead">{{product.description}}</p>
          
          <h4>Specifications:</h4>
          <ul class="specs-list">
            <li>High performance processor</li>
            <li>Latest technology</li>
            <li>1 year warranty</li>
          </ul>
          
          <div class="row mt-4">
            <div class="col-md-4">
              <label for="quantity">Quantity:</label>
              <input type="number" class="form-control" id="quantity" [(ngModel)]="quantity" min="1" [max]="product.stock">
            </div>
          </div>
          
          <div class="mt-4">
            <button class="btn btn-primary btn-lg" (click)="addToCart()">
              <i class="fas fa-shopping-cart"></i> Add to Cart
            </button>
            <button class="btn btn-success btn-lg" (click)="buyNow()">
              <i class="fas fa-bolt"></i> Buy Now
            </button>
          </div>
        </div>
      </div>
      
      <!-- Related Products -->
      <section class="mt-5" *ngIf="relatedProducts.length">
        <h3>Related Products</h3>
        <div class="row">
          <div class="col-lg-4 col-md-6 mb-4" *ngFor="let prod of relatedProducts">
            <div class="card product-card h-100">
              <img [src]="prod.imageUrl?.replace('https://localhost:7128https://localhost:7128','https://localhost:7128')" class="card-img-top" [alt]="prod.name" onerror="this.src='https://via.placeholder.com/300x200'">
              <div class="card-body">
                <h5 class="card-title">{{prod.name}}</h5>
                <p class="product-price">{{formatPrice(prod.price)}}</p>
                <a [routerLink]="['/product', prod.id]" class="btn btn-outline-primary">View Details</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
