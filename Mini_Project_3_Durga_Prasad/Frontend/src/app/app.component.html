 <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
      <div class="container">
        <a class="navbar-brand" routerLink="/home">ShopEZ</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" routerLink="/home" routerLinkActive="active">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/products" routerLinkActive="active">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/cart" routerLinkActive="active">
                <i class="fas fa-shopping-cart"></i>
                Cart <span class="cart-count">{{cartCount}}</span>
              </a>
            </li>
            <li class="nav-item" *ngIf="isLoggedIn">
              <a class="nav-link" routerLink="/orders" routerLinkActive="active">My Orders</a>
            </li>
            <li class="nav-item" *ngIf="!isLoggedIn">
              <a class="nav-link" routerLink="/login">Login</a>
            </li>
            <li class="nav-item" *ngIf="!isLoggedIn">
              <a class="nav-link" routerLink="/register">Register</a>
            </li>
            <li class="nav-item" *ngIf="isAdmin">
              <a class="nav-link" routerLink="/admin">Admin Panel</a>
            </li>
          </ul>
          
          <!-- Search form (visible only on products page) -->
          <form class="d-flex me-2" role="search" (ngSubmit)="onSearch()" *ngIf="showSearch">
            <input class="form-control me-2" type="search" placeholder="Search products..." [(ngModel)]="searchTerm" name="search">
            <button class="btn btn-outline-primary" type="submit">Search</button>
          </form>

          <!-- Logout button with prominent style -->
          <button *ngIf="isLoggedIn" class="btn btn-outline-danger" (click)="logout()">
            <i class="fas fa-sign-out-alt me-1"></i> Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- Notification Area -->
    <div class="container mt-3" id="notificationArea">
      <div *ngIf="notificationMessage" class="alert alert-dismissible fade show" [class.alert-success]="notificationType === 'success'" [class.alert-danger]="notificationType === 'danger'" role="alert">
        {{notificationMessage}}
        <button type="button" class="btn-close" (click)="clearNotification()"></button>
      </div>
    </div>

    <router-outlet></router-outlet>

    <footer class="footer">
      <div class="container text-center">
        <p>&copy; 2026 ShopEZ. All rights reserved.</p>
        <p> Durgaprasad Manukonda</p>
      </div>
    </footer>
  `
