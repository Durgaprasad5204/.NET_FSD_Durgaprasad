<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEZ - Shopping Cart</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="lib/bootstrap/css/bootstrap.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">ShopEZ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cart.html">
                            <i class="fas fa-shopping-cart"></i>
                            Cart <span class="cart-count">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Notification Area -->
    <div class="container mt-3" id="notificationArea"></div>

    <!-- Main Content -->
    <main class="container py-4">
        <h1 class="mb-4">Shopping Cart</h1>
        
        <!-- Empty Cart Message -->
        <div class="text-center py-5" id="emptyCartMessage" style="display: none;">
            <i class="fas fa-shopping-cart fa-4x text-muted mb-3"></i>
            <h3>Your cart is empty</h3>
            <p class="text-muted">Looks like you haven't added any items to your cart yet.</p>
            <a href="products.html" class="btn btn-primary">Continue Shopping</a>
        </div>
        
        <!-- Cart Items -->
        <div class="row" id="cartItems">
            <!-- Cart items loaded via JavaScript -->
        </div>
        
        <!-- Cart Summary -->
        <div class="row mt-4" id="cartSummary" style="display: none;">
            <div class="col-md-6 offset-md-6">
                <div class="cart-summary">
                    <h4>Order Summary</h4>
                    <table class="table table-borderless">
                        <tr>
                            <td>Subtotal:</td>
                            <td class="text-end" id="subtotal">₹0</td>
                        </tr>
                        <tr>
                            <td>Shipping:</td>
                            <td class="text-end" id="shipping">₹50</td>
                        </tr>
                        <tr>
                            <td>Tax (18% GST):</td>
                            <td class="text-end" id="tax">₹0</td>
                        </tr>
                        <tr class="fw-bold">
                            <td>Total:</td>
                            <td class="text-end" id="total">₹0</td>
                        </tr>
                    </table>
                    
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-outline-danger" id="clearCartBtn">
                            <i class="fas fa-trash"></i> Clear Cart
                        </button>
                        <button class="btn btn-outline-primary" id="continueShoppingBtn">
                            <i class="fas fa-arrow-left"></i> Continue Shopping
                        </button>
                        <button class="btn btn-success" id="checkoutBtn">
                            Proceed to Checkout <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2026 ShopEZ. All rights reserved.</p>
            <p> Durgaprasad Manukonda</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="lib/jquery/jquery.min.js"></script>
    <script src="lib/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
